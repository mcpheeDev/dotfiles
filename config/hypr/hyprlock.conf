background {
    monitor =
    color = rgba(1a1b26ff)
    blur_passes = 0
}

input-field {
    monitor =
    size = 300, 48
    outline_thickness = 2
    outer_color = rgb(7aa2f7)
    inner_color = rgb(24283b)
    font_color = rgb(c0caf5)
    fade_on_empty = true
    placeholder_text = Password
    position = 0, -80
    halign = center
    valign = center
    rounding = 8
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(c0caf5ff)
    font_size = 72
    font_family = JetBrains Mono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(565f89ff)
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    position = 0, 0
    halign = center
    valign = center
}
